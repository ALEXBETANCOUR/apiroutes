<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Bank API + MongoDB</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <section class="panel">
        <h1>Consulta World Bank</h1>
        <p class="subtitle">Indicadores economicos y demograficos con historial en MongoDB</p>

        <form id="indicator-form">
          <div class="row">
            <label for="country">Codigo de pais</label>
            <input id="country" name="country" type="text" maxlength="3" placeholder="ECU" required />
          </div>
          <div class="row">
            <label for="indicator">Codigo de indicador</label>
            <input
              id="indicator"
              name="indicator"
              type="text"
              placeholder="SP.POP.TOTL"
              required
            />
          </div>
          <div class="row">
            <label for="mrv">MRV (ultimos registros)</label>
            <input id="mrv" name="mrv" type="number" min="1" max="20" value="5" />
          </div>
          <button type="submit">Consultar indicador</button>
        </form>

        <div class="actions">
          <button type="button" id="country-button">Ver informacion del pais</button>
          <button type="button" id="population-button">Ver poblacion</button>
        </div>

        <p id="feedback" class="feedback"></p>
      </section>

      <section class="panel">
        <h2>Resultado del pais</h2>
        <div id="country-result" class="result-block">
          <p>Sin datos.</p>
        </div>
      </section>

      <section class="panel full-width">
        <h2>Resultado del indicador</h2>
        <div id="indicator-result" class="result-block">
          <p>Sin datos.</p>
        </div>
      </section>

      <section class="panel full-width">
        <h2>Historial guardado</h2>
        <div id="history-list" class="history-list"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
